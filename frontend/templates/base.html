<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Funtasia 2026 — Makers Typing Game Booth{% endblock %}</title>
  <meta name="description" content="{% block description %}Join the queue for the Makers Typing Game Booth at Funtasia 2026! Test your typing speed and win prizes.{% endblock %}">
  {% block meta %}{% endblock %}

  <!-- Google Fonts: Space + Arcade -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <!-- Material Symbols Outlined -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">

  <link rel="stylesheet" href="/css/main.css?v=2">
  {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  {% block top_logos %}{% endblock %}

  {% block content %}{% endblock %}

  {% block footer %}
  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <p class="footer-text">
      Made with <span class="material-symbols-outlined footer-icon" aria-hidden="true">rocket_launch</span>
      by <strong>NJC Makers' Society</strong> · Funtasia 2026
    </p>
  </footer>
  {% endblock %}

  <script src="/js/config.js?v=2"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
