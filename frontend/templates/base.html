<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Funtasia 2026 — Makers Typing Game Booth{% endblock %}</title>
  <meta name="description" content="{% block description %}Join the queue for the Makers Typing Game Booth at Funtasia 2026! Test your typing speed and win prizes.{% endblock %}">
  {% block meta %}{% endblock %}

  <!-- Google Fonts: Display + Body -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Material Symbols Outlined -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">

  <link rel="stylesheet" href="/css/main.css">
  {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  <div class="top-logos" style="position: absolute; top: 0.2rem; left: 1rem; display: flex; gap: 1rem; z-index: 100;">
    <img src="/images/makers-logo.svg" alt="Makers Logo" style="height: 22px; width: auto; margin-top: 8px;">
  </div>

  <div class="top-logos" style="position: absolute; top: 0.2rem; right: 1rem; display: flex; gap: 1rem; z-index: 100;">
    <img src="/images/funtasia-logo.svg" alt="Funtasia Logo" style="height: 40px; width: auto;">
  </div>

  {% block content %}{% endblock %}

  {% block footer %}
  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <p class="footer-text">
      Made with <span class="material-symbols-outlined footer-icon" aria-hidden="true">coffee</span>
      by <strong>NJC Makers' Society</strong> · Funtasia 2026
    </p>
  </footer>
  {% endblock %}

  <script src="/js/config.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
